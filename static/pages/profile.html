<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人中心 — 物联网设备管理平台</title>
  <link rel="stylesheet" href="/static/css/common.css" />
</head>
<body data-page="profile">
  <header class="topbar">
    <span class="brand">物联网设备管理平台</span>
    <nav>
      <a href="/pages/index.html" data-nav="index">概览</a>
      <a href="/pages/devices.html" data-nav="devices">设备</a>
      <a href="/pages/monitor.html" data-nav="monitor">监测</a>
      <a href="/pages/control.html" data-nav="control">控制</a>
      <a href="/pages/ai_report.html" data-nav="ai">AI报告</a>
      <a href="/pages/ble_setup.html" data-nav="ble">蓝牙配网</a>
      <a href="/pages/profile.html" data-nav="profile">个人中心</a>
    </nav>
  </header>
  <main class="container">
    <h1>个人中心</h1>
    <p class="muted">会话信息来自服务端 Session，退出后需重新登录。</p>

    <section class="card wide">
      <h2>账号信息</h2>
      <form id="form-profile" class="form-grid">
        <label>用户名
          <input id="f-username" type="text" disabled />
        </label>
        <label>昵称
          <input id="f-nickname" type="text" disabled />
        </label>
        <label>邮箱
          <input id="f-email" type="email" placeholder="用于温度告警邮件通知" />
        </label>
        <label>手机号
          <input id="f-phone" type="text" placeholder="可选" />
        </label>
      </form>
      <p id="tip" class="tip"></p>
      <div class="btn-row mt-4">
        <button type="button" class="btn inline" id="btn-save">保存设置</button>
        <button type="button" class="btn inline btn-secondary" id="btn-email-test">测试邮件</button>
        <button type="button" class="btn inline btn-danger" id="btn-out">退出登录</button>
        <a class="btn inline btn-secondary link-btn" href="/pages/index.html">返回首页</a>
      </div>
    </section>
  </main>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/nav.js"></script>
  <script src="/static/js/toast.js"></script>
  <script>
    async function loadProfile() {
      try {
        var p = await apiFetch("/api/user/profile");
        document.getElementById("f-username").value = p.username || "";
        document.getElementById("f-nickname").value = p.nickname || "";
        document.getElementById("f-email").value = p.email || "";
        document.getElementById("f-phone").value = p.phone || "";
      } catch (e) {
        if (e.code === 401) window.location.href = "/pages/login.html";
        document.getElementById("tip").textContent = e.message || "加载失败";
        document.getElementById("tip").className = "err";
        showToast(e.message || "加载失败", "err");
      }
    }

    document.getElementById("btn-save").addEventListener("click", async function () {
      var tip = document.getElementById("tip");
      tip.textContent = "";
      try {
        await apiFetch("/api/user/profile", {
          method: "PUT",
          body: JSON.stringify({
            email: document.getElementById("f-email").value.trim(),
            phone: document.getElementById("f-phone").value.trim(),
          }),
        });
        tip.textContent = "保存成功";
        tip.className = "ok";
        showToast("个人设置已保存", "ok");
        loadProfile();
      } catch (e) {
        tip.textContent = e.message || "保存失败";
        tip.className = "err";
        showToast(e.message || "保存失败", "err");
      }
    });

    document.getElementById("btn-email-test").addEventListener("click", async function () {
      var tip = document.getElementById("tip");
      tip.textContent = "发送测试邮件中...";
      tip.className = "tip";
      try {
        await apiFetch("/api/user/email-test", { method: "POST", body: "{}" });
        tip.textContent = "测试邮件发送成功，请检查收件箱（含垃圾箱）";
        tip.className = "ok";
        showToast("测试邮件发送成功", "ok");
      } catch (e) {
        tip.textContent = e.message || "测试邮件发送失败";
        tip.className = "err";
        showToast(e.message || "测试邮件发送失败", "err");
      }
    });

    loadProfile();
    document.getElementById("btn-out").addEventListener("click", async function () {
      try {
        await apiFetch("/api/auth/logout", { method: "POST", body: "{}" });
      } catch (_) {}
      window.location.href = "/pages/login.html";
    });
  </script>
</body>
</html>
