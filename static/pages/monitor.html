<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数据监测 — 物联网设备管理平台</title>
  <link rel="stylesheet" href="/static/css/common.css" />
  <link rel="preload" href="/static/js/vendor/chart.umd.min.js" as="script" />
</head>
<body data-page="monitor">
  <header class="topbar">
    <span class="brand">物联网设备管理平台</span>
    <nav>
      <a href="/pages/index.html" data-nav="index">概览</a>
      <a href="/pages/devices.html" data-nav="devices">设备</a>
      <a href="/pages/monitor.html" data-nav="monitor">监测</a>
      <a href="/pages/control.html" data-nav="control">控制</a>
      <a href="/pages/ai_report.html" data-nav="ai">AI报告</a>
      <a href="/pages/ble_setup.html" data-nav="ble">蓝牙配网</a>
      <a href="/pages/profile.html" data-nav="profile">个人中心</a>
    </nav>
  </header>
  <main class="container">
    <section class="page-head">
      <div>
        <h1>数据监测</h1>
        <p class="muted">优先看趋势与关键指标；原始数据与历史明细已下沉到底部，可按需展开。</p>
      </div>
    </section>

    <section class="card wide">
      <div class="card-head">
        <div><h2>筛选与刷新</h2></div>
      </div>
      <div class="grid-3">
        <label>设备<select id="sel-dev"><option value="">加载中…</option></select></label>
        <label>开始时间<input type="datetime-local" id="t-start" /></label>
        <label>结束时间<input type="datetime-local" id="t-end" /></label>
      </div>
      <div class="btn-row">
        <button type="button" class="btn inline" id="btn-load">刷新数据</button>
        <button type="button" class="btn inline btn-secondary quick-range" data-days="1">24小时</button>
        <button type="button" class="btn inline btn-secondary quick-range" data-days="3">近3天</button>
        <button type="button" class="btn inline btn-secondary quick-range" data-days="7">近7天</button>
        <button type="button" class="btn inline btn-secondary quick-range" data-days="30">近30天</button>
      </div>
      <p id="tip" class="tip"></p>
    </section>

    <section class="card wide">
      <div class="card-head"><div><h2>实时概览</h2></div></div>
      <div class="stat-grid">
        <div class="stat-box">
          <span>温度</span>
          <strong id="v-temp">—</strong>
        </div>
        <div class="stat-box">
          <span>湿度</span>
          <strong id="v-hum">—</strong>
        </div>
        <div class="stat-box">
          <span>最近上报</span>
          <strong id="v-time" style="font-size:1rem;">—</strong>
        </div>
      </div>
      <p id="alert-status" class="tip">最近一次邮件告警状态：暂无</p>
    </section>

    <section class="card wide">
      <div class="card-head"><div><h2>趋势图</h2></div></div>
      <div class="chart-wrap" style="height: 420px;"><canvas id="chart"></canvas></div>
    </section>

    <details class="card wide">
      <summary><strong>原始数据（可折叠）</strong></summary>
      <pre id="latest" class="muted mt-3" style="margin-bottom:0;">—</pre>
    </details>

    <details class="card wide">
      <summary><strong>历史明细（最近 20 条）</strong></summary>
      <table class="data-table responsive mt-3" id="tbl">
        <thead>
          <tr><th>时间</th><th>温度℃</th><th>湿度%</th><th>光照 lux</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </details>
  </main>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/nav.js"></script>
  <script src="/static/js/toast.js"></script>
  <script src="/static/js/vendor/chart.umd.min.js"></script>
  <script>
    var chart;
    var gTempWarnHighByDevice = {};
    var gLastPopupAtByDevice = {};
    var gLastSeenDataIdByDevice = {};

    function toApiDatetime(localStr) {
      if (!localStr) return null;
      return localStr.replace("T", " ") + ":00";
    }

    function toLocalDatetimeInputValue(dt) {
      var y = dt.getFullYear();
      var m = String(dt.getMonth() + 1).padStart(2, "0");
      var d = String(dt.getDate()).padStart(2, "0");
      var hh = String(dt.getHours()).padStart(2, "0");
      var mm = String(dt.getMinutes()).padStart(2, "0");
      return y + "-" + m + "-" + d + "T" + hh + ":" + mm;
    }

    function applyQuickRange(days) {
      var end = new Date();
      var start = new Date(end.getTime() - days * 24 * 60 * 60 * 1000);
      document.getElementById("t-start").value = toLocalDatetimeInputValue(start);
      document.getElementById("t-end").value = toLocalDatetimeInputValue(end);
      loadData();
    }

    /** 一次请求同时填充下拉框与设备级温度阈值映射 */
    async function loadDevicesAndThresholds() {
      var sel = document.getElementById("sel-dev");
      gTempWarnHighByDevice = {};
      try {
        var list = await apiFetch("/api/devices");
        sel.innerHTML = "";
        if (!list.length) {
          sel.innerHTML = "<option value=''>暂无设备</option>";
          return;
        }
        list.forEach(function (d) {
          gTempWarnHighByDevice[String(d.id)] =
            d.temp_warn_high != null ? parseFloat(d.temp_warn_high) : null;
          var o = document.createElement("option");
          o.value = d.id;
          o.textContent = (d.name || d.device_uid) + " (#" + d.id + ")";
          sel.appendChild(o);
        });
      } catch (e) {
        if (e.code === 401) window.location.href = "/pages/login.html";
        else {
          sel.innerHTML = "<option value=''>加载失败</option>";
          gTempWarnHighByDevice = {};
        }
      }
    }

    async function maybeShowTempAlert(deviceId, latestPayload) {
      var th = gTempWarnHighByDevice[String(deviceId)];
      if (th == null || !latestPayload) return;
      if (latestPayload.id == null) return;
      var dataId = String(latestPayload.id);
      if (gLastSeenDataIdByDevice[deviceId] === dataId) return;
      gLastSeenDataIdByDevice[deviceId] = dataId;
      var t = latestPayload.temperature;
      var h = latestPayload.humidity;
      if (t == null || Number(t) <= Number(th)) return;

      var now = Date.now();
      var last = gLastPopupAtByDevice[deviceId] || 0;
      if (now - last < 5 * 60 * 1000) return;
      gLastPopupAtByDevice[deviceId] = now;

      var advice = "请检查通风散热并关注设备运行状态。";
      try {
        var resp = await apiFetch("/api/ai/temperature-advice", {
          method: "POST",
          body: JSON.stringify({
            temperature: Number(t),
            humidity: h != null ? Number(h) : null,
            threshold: Number(th),
          }),
        });
        if (resp && resp.advice) advice = resp.advice;
      } catch (_) {}

      alert(
        "温度告警！\n" +
        "当前温度：" + Number(t).toFixed(2) + "℃\n" +
        "告警阈值：" + Number(th).toFixed(2) + "℃\n\n" +
        "AI建议：\n" + advice
      );
    }

    async function loadAlertStatus(deviceId) {
      var el = document.getElementById("alert-status");
      try {
        var s = await apiFetch("/api/user/alert-status/" + deviceId);
        if (!s) {
          el.textContent = "最近一次邮件告警状态：暂无";
          el.className = "tip";
          return;
        }
        var txt = "最近一次邮件告警状态：" + (s.time || "") + " | " + (s.message || s.status || "未知");
        txt += " | 温度 " + Number(s.temperature || 0).toFixed(2) + "℃ / 阈值 " + Number(s.threshold || 0).toFixed(2) + "℃";
        if (s.to_email) txt += " | 收件人 " + s.to_email;
        el.textContent = txt;
        el.className = s.status === "sent" ? "ok" : (s.status === "failed" ? "err" : "tip");
      } catch (e) {
        el.textContent = "最近一次邮件告警状态：查询失败（" + (e.message || "未知错误") + "）";
        el.className = "err";
      }
    }

    function buildChart(rowsAsc) {
      var ctx = document.getElementById("chart");
      if (chart) chart.destroy();
      var labels = rowsAsc.map(function (r) { return r.recorded_at; });
      var tData = rowsAsc.map(function (r) { return r.temperature != null ? Number(r.temperature) : null; });
      var hData = rowsAsc.map(function (r) { return r.humidity != null ? Number(r.humidity) : null; });
      var lData = rowsAsc.map(function (r) { return r.illuminance != null ? Number(r.illuminance) : null; });
      chart = new Chart(ctx, {
        type: "line",
        data: {
          labels: labels,
          datasets: [
            {
              label: "温度℃",
              data: tData,
              borderColor: "#2563eb",
              backgroundColor: "rgba(37,99,235,.12)",
              tension: 0.35,
              pointRadius: 0,
              borderWidth: 2,
              fill: true
            },
            {
              label: "湿度%",
              data: hData,
              borderColor: "#059669",
              backgroundColor: "rgba(5,150,105,.08)",
              tension: 0.35,
              pointRadius: 0,
              borderWidth: 2,
              fill: true
            },
            {
              label: "光照",
              data: lData,
              borderColor: "#d97706",
              tension: 0.35,
              pointRadius: 0,
              borderWidth: 2,
              yAxisID: "y1"
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: "index", intersect: false },
          plugins: {
            legend: { position: "top" },
            tooltip: { backgroundColor: "rgba(17,24,39,.9)" }
          },
          scales: {
            x: { ticks: { maxTicksLimit: 8 } },
            y: { position: "left", title: { display: true, text: "温湿度" } },
            y1: { position: "right", grid: { drawOnChartArea: false }, title: { display: true, text: "光照" } },
          },
        },
      });
    }

    async function loadData() {
      var tip = document.getElementById("tip");
      tip.textContent = "";
      var id = document.getElementById("sel-dev").value;
      if (!id) {
        tip.textContent = "请选择设备";
        showToast("请先选择设备", "info");
        return;
      }
      try {
        var latest = await apiFetch("/api/devices/" + id + "/latest");
        document.getElementById("latest").textContent = JSON.stringify(latest.payload, null, 2) || "无数据";
        var p = latest.payload || {};
        document.getElementById("v-temp").textContent = p.temperature != null ? (Number(p.temperature).toFixed(1) + " ℃") : "—";
        document.getElementById("v-hum").textContent = p.humidity != null ? (Number(p.humidity).toFixed(1) + " %") : "—";
        document.getElementById("v-time").textContent = p.recorded_at || "—";
        maybeShowTempAlert(id, latest.payload);
        loadAlertStatus(id);

        var start = toApiDatetime(document.getElementById("t-start").value);
        var end = toApiDatetime(document.getElementById("t-end").value);
        var q = "?page=1&page_size=200";
        if (start) q += "&start=" + encodeURIComponent(start);
        if (end) q += "&end=" + encodeURIComponent(end);
        var hist = await apiFetch("/api/devices/" + id + "/history" + q);
        var rows = (hist.list || []).slice().reverse();
        var tbody = document.querySelector("#tbl tbody");
        tbody.innerHTML = "";
        if (!hist.list || !hist.list.length) {
          tbody.innerHTML = "<tr><td colspan='4' class='muted'>暂无数据</td></tr>";
          if (chart) chart.destroy();
          document.getElementById("v-temp").textContent = "—";
          document.getElementById("v-hum").textContent = "—";
          document.getElementById("v-time").textContent = "—";
          return;
        }
        (hist.list || []).slice(0, 20).forEach(function (r) {
          var tr = document.createElement("tr");
          tr.innerHTML =
            "<td data-label='时间'>" + r.recorded_at + "</td>" +
            "<td data-label='温度℃'>" + (r.temperature != null ? r.temperature : "—") + "</td>" +
            "<td data-label='湿度%'>" + (r.humidity != null ? r.humidity : "—") + "</td>" +
            "<td data-label='光照 lux'>" + (r.illuminance != null ? r.illuminance : "—") + "</td>";
          tbody.appendChild(tr);
        });
        buildChart(rows);
      } catch (e) {
        tip.textContent = e.message;
        showToast(e.message || "加载失败", "err");
      }
    }

    document.getElementById("btn-load").addEventListener("click", loadData);
    document.querySelectorAll(".quick-range").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var days = parseInt(btn.getAttribute("data-days"), 10);
        if (!days || days <= 0) return;
        applyQuickRange(days);
      });
    });
    loadDevicesAndThresholds().then(function () {
      var sel = document.getElementById("sel-dev");
      if (sel.options.length && sel.options[0].value) loadData();
    });
  </script>
</body>
</html>
