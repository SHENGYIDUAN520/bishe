<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 分析报告 — 物联网设备管理平台</title>
  <link rel="stylesheet" href="/static/css/common.css" />
</head>
<body data-page="ai">
  <header class="topbar">
    <span class="brand">物联网设备管理平台</span>
    <nav>
      <a href="/pages/index.html" data-nav="index">概览</a>
      <a href="/pages/devices.html" data-nav="devices">设备</a>
      <a href="/pages/monitor.html" data-nav="monitor">监测</a>
      <a href="/pages/control.html" data-nav="control">控制</a>
      <a href="/pages/ai_report.html" data-nav="ai">AI报告</a>
      <a href="/pages/ble_setup.html" data-nav="ble">蓝牙配网</a>
      <a href="/pages/profile.html" data-nav="profile">个人中心</a>
    </nav>
  </header>
  <main class="container">
    <section class="page-head">
      <div>
        <h1>AI 数据分析报告</h1>
        <p class="muted">支持一键生成、列表管理与详情回看。</p>
      </div>
    </section>
    <div class="kpi-strip">
      <div class="kpi-card"><div class="kpi-label">报告总数</div><div class="kpi-value" id="k-ai-total">0</div></div>
      <div class="kpi-card"><div class="kpi-label">今日新增</div><div class="kpi-value" id="k-ai-today">0</div></div>
      <div class="kpi-card"><div class="kpi-label">方舟报告</div><div class="kpi-value" id="k-ai-ark">0</div></div>
      <div class="kpi-card"><div class="kpi-label">本地报告</div><div class="kpi-value" id="k-ai-local">0</div></div>
    </div>

    <section class="card wide">
      <div class="card-head"><div><h2>生成新报告</h2></div></div>
      <div class="form-grid">
        <label>针对设备（可选，默认取第一台）
          <select id="sel-dev"><option value="">默认第一台</option></select>
        </label>
        <label>使用环境
          <select id="sel-env">
            <option value="machine_room">机房</option>
            <option value="home" selected>普通家庭</option>
            <option value="factory">工厂</option>
            <option value="custom">自定义</option>
          </select>
        </label>
        <label id="env-custom-wrap" style="display:none;">
          自定义环境描述
          <textarea id="env-custom" placeholder="例如：办公室机柜+长期开门、需要偏向散热与稳定性" rows="3"></textarea>
        </label>
      </div>
      <div class="btn-row">
        <button type="button" class="btn inline" id="btn-run">生成分析</button>
        <button type="button" class="btn inline btn-secondary" id="btn-refresh">刷新列表</button>
      </div>
      <p id="tip" class="tip"></p>
    </section>

    <section class="card wide">
      <div class="card-head"><div><h2>报告列表</h2></div></div>
      <table class="data-table responsive" id="tbl">
        <thead>
          <tr><th>ID</th><th>标题</th><th>摘要</th><th>时间</th><th>操作</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

  </main>
  <div class="modal-mask" id="report-modal" aria-hidden="true">
    <div class="modal-card">
      <div class="card-head">
        <div>
          <h2>报告详情</h2>
          <p class="muted" id="detail-meta">—</p>
        </div>
        <div class="table-actions">
          <button type="button" class="btn inline btn-secondary" id="btn-prev-report">上一条</button>
          <button type="button" class="btn inline btn-secondary" id="btn-next-report">下一条</button>
          <button type="button" class="btn inline btn-secondary" id="btn-close-modal">关闭</button>
        </div>
      </div>
      <div id="detail-body" class="report-detail muted">—</div>
    </div>
  </div>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/nav.js"></script>
  <script src="/static/js/toast.js"></script>
  <script>
    let g_detailId = null;
    let g_reportIds = [];

    async function loadDevices() {
      var sel = document.getElementById("sel-dev");
      try {
        var list = await apiFetch("/api/devices");
        sel.innerHTML = "<option value=''>默认第一台</option>";
        list.forEach(function (d) {
          var o = document.createElement("option");
          o.value = d.id;
          o.textContent = (d.name || d.device_uid) + " (#" + d.id + ")";
          sel.appendChild(o);
        });
      } catch (e) {
        if (e.code === 401) window.location.href = "/pages/login.html";
      }
    }

    async function refreshList() {
      var tbody = document.querySelector("#tbl tbody");
      try {
        var list = await apiFetch("/api/ai/reports");
        g_reportIds = (list || []).map(function (r) { return Number(r.id); });
        tbody.innerHTML = "";
        if (!list.length) {
          document.getElementById("k-ai-total").textContent = 0;
          document.getElementById("k-ai-today").textContent = 0;
          document.getElementById("k-ai-ark").textContent = 0;
          document.getElementById("k-ai-local").textContent = 0;
          tbody.innerHTML = "<tr><td colspan='5' class='muted'>暂无报告</td></tr>";
          return;
        }
        var today = new Date().toISOString().slice(0, 10);
        var todayCnt = 0;
        var arkCnt = 0;
        var localCnt = 0;
        list.forEach(function (r) {
          var c = String(r.created_at || "");
          if (c.slice(0, 10) === today) todayCnt++;
          if (String(r.report_type || "").indexOf("ark") >= 0) arkCnt++;
          else localCnt++;
        });
        document.getElementById("k-ai-total").textContent = list.length;
        document.getElementById("k-ai-today").textContent = todayCnt;
        document.getElementById("k-ai-ark").textContent = arkCnt;
        document.getElementById("k-ai-local").textContent = localCnt;
        list.forEach(function (r) {
          var tr = document.createElement("tr");
          var sum = (r.summary || "").replace(/</g, "&lt;");
          if (sum.length > 60) sum = sum.slice(0, 60) + "…";
          tr.innerHTML =
            "<td data-label='ID'>" + r.id + "</td>" +
            "<td data-label='标题'>" + (r.title || "—") + "</td>" +
            "<td data-label='摘要'>" + sum + "</td>" +
            "<td data-label='时间'>" + (r.created_at || "") + "</td>" +
            "<td data-label='操作'><div class='table-actions'>" +
              "<button type='button' class='btn inline btn-secondary view' data-id='" + r.id + "'>查看</button>" +
              "<button type='button' class='btn inline btn-danger del' data-id='" + r.id + "'>删除</button>" +
            "</div></td>";
          tbody.appendChild(tr);
        });
        tbody.querySelectorAll(".view").forEach(function (btn) {
          btn.addEventListener("click", function () {
            loadDetail(btn.getAttribute("data-id"));
          });
        });
        tbody.querySelectorAll(".del").forEach(function (btn) {
          btn.addEventListener("click", async function () {
            var id = btn.getAttribute("data-id");
            if (!confirm("确定删除该 AI 报告？")) return;
            try {
              await apiFetch("/api/ai/reports/" + id, { method: "DELETE" });
              if (String(g_detailId) === String(id)) {
                g_detailId = null;
                closeDetailModal();
              }
              showToast("报告已删除", "ok");
              refreshList();
            } catch (e) {
              showToast(e.message || "删除失败", "err");
            }
          });
        });
      } catch (e) {
        tbody.innerHTML = "<tr><td colspan='5' class='err'>" + e.message + "</td></tr>";
      }
    }

    async function loadDetail(id) {
      try {
        var r = await apiFetch("/api/ai/reports/" + id);
        g_detailId = id;
        document.getElementById("detail-meta").textContent =
          "ID " + r.id + " | 设备 " + (r.device_id || "—") + " | " + (r.report_type || "");
        document.getElementById("detail-body").textContent = (r.title || "") + "\n\n" + (r.summary || "") + "\n\n" + (r.content || "");
        document.getElementById("detail-body").className = "report-detail";
        openDetailModal();
      } catch (e) {
        showToast(e.message || "详情加载失败", "err");
      }
    }

    function openDetailModal() {
      var m = document.getElementById("report-modal");
      m.classList.add("show");
      m.setAttribute("aria-hidden", "false");
      document.body.classList.add("modal-open");
      syncDetailNavButtons();
    }

    function closeDetailModal() {
      var m = document.getElementById("report-modal");
      if (!m.classList.contains("show")) return;
      m.classList.remove("show");
      m.setAttribute("aria-hidden", "true");
      window.setTimeout(function () {
        document.body.classList.remove("modal-open");
        document.getElementById("detail-meta").textContent = "—";
        document.getElementById("detail-body").textContent = "—";
        document.getElementById("detail-body").className = "report-detail muted";
      }, 220);
    }

    function syncDetailNavButtons() {
      var prev = document.getElementById("btn-prev-report");
      var next = document.getElementById("btn-next-report");
      var idx = g_reportIds.indexOf(Number(g_detailId));
      prev.disabled = idx <= 0;
      next.disabled = idx < 0 || idx >= g_reportIds.length - 1;
    }

    function stepDetail(offset) {
      var idx = g_reportIds.indexOf(Number(g_detailId));
      if (idx < 0) return;
      var target = g_reportIds[idx + offset];
      if (!target) return;
      loadDetail(target);
    }

    function toggleEnvCustom() {
      var env = document.getElementById("sel-env").value;
      document.getElementById("env-custom-wrap").style.display = env === "custom" ? "block" : "none";
    }

    document.getElementById("btn-run").addEventListener("click", async function () {
      var tip = document.getElementById("tip");
      tip.textContent = "";
      var sid = document.getElementById("sel-dev").value;
      var body = {};
      if (sid) body.device_id = parseInt(sid, 10);
      body.environment_type = document.getElementById("sel-env").value;
      if (body.environment_type === "custom") {
        body.custom_context = document.getElementById("env-custom").value || "";
      }
      try {
        var res = await apiFetch("/api/ai/analyze", { method: "POST", body: JSON.stringify(body) });
        tip.textContent = "已生成报告 #" + res.report_id;
        tip.className = "ok";
        showToast("已生成报告 #" + res.report_id, "ok");
        refreshList();
        loadDetail(res.report_id);
      } catch (e) {
        tip.textContent = e.message;
        tip.className = "err";
        showToast(e.message || "生成失败", "err");
      }
    });

    document.getElementById("btn-refresh").addEventListener("click", refreshList);
    document.getElementById("btn-close-modal").addEventListener("click", closeDetailModal);
    document.getElementById("btn-prev-report").addEventListener("click", function () {
      stepDetail(-1);
    });
    document.getElementById("btn-next-report").addEventListener("click", function () {
      stepDetail(1);
    });
    document.getElementById("report-modal").addEventListener("click", function (e) {
      if (e.target.id === "report-modal") closeDetailModal();
    });
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") closeDetailModal();
    });

    document.getElementById("sel-env").addEventListener("change", toggleEnvCustom);
    toggleEnvCustom();

    loadDevices();
    refreshList();
  </script>
</body>
</html>
